name: Frontend Release CI

on:
  push:
    branches:
      - develop

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend

      # =======================================================
      # ▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼ 디버깅 단계 추가 ▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼
      # =======================================================
      - name: 🧐 Check files in frontend directory
        run: ls -la ./frontend

      - name: 🧐 Verify package.json content
        run: cat ./frontend/package.json
      # =======================================================
      # ▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲ 디버깅 단계 추가 ▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲
      # =======================================================

      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v4
        working-directory: ./frontend
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
